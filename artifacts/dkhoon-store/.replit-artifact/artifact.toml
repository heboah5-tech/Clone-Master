kind = "web"
previewPath = "/"
title = "Dkhoon Emirates Store"
version = "1.0.0"
id = "artifacts/dkhoon-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25540

[services.development]
run = "pnpm --filter @workspace/dkhoon-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dkhoon-store", "run", "build" ]
publicDir = "artifacts/dkhoon-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25540"
BASE_PATH = "/"
